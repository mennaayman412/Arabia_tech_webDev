<style>
:root {
    --primary: #0056D2;
    --primary-light: #e8f0fe;
    --success: #0a8a3c;
    --success-light: #e8f5e9;
    --text: #1a1a2e;
    --text-mid: #595959;
    --text-muted: #767676;
    --border: #e0e0e0;
    --bg: #f8f9fa;
    --white: #ffffff;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
}

.header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
}

.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

.header-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
}

.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }

.logo-text h1 { font-size: 30px; color: var(--text); font-weight: 700; }
.logo-text p { font-size: 12px; color: var(--text-muted); }

.page-wrapper {
    display: flex;
    max-width: 1400px;
    margin: 0 auto;
    gap: 0;
}

.sidebar {
    width: 280px;
    background: var(--white);
    border-left: 1px solid var(--border);
    position: sticky;
    top: 81px;
    height: calc(100vh - 81px);
    overflow-y: auto;
    flex-shrink: 0;
}

.sidebar-header {
    padding: 24px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, var(--primary), #0041a8);
    color: white;
}

.sidebar-header h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.sidebar-header p { font-size: 13px; opacity: 0.9; }

.sidebar-projects { padding: 12px 8px; }

.sidebar-project {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    margin-bottom: 6px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
}

.sidebar-project:hover { background: var(--primary-light); border-color: var(--primary); }
.sidebar-project.active {
    background: var(--primary-light);
    border-color: var(--primary);
    box-shadow: 0 2px 8px rgba(0, 86, 210, 0.15);
}

.sidebar-project-number {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--primary), #0041a8);
    color: white; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; flex-shrink: 0;
}

.sidebar-project.active .sidebar-project-number {
    background: linear-gradient(135deg, var(--success), #087030);
    transform: scale(1.05);
}

.sidebar-project-info { flex: 1; }
.sidebar-project-info .title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.sidebar-project-info .level { font-size: 12px; color: var(--text-muted); }

.level-badge {
    display: inline-block;
    padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
}
.level-beginner   { background: #e8f5e9; color: #0a8a3c; }
.level-intermediate { background: #fff3e0; color: #f57c00; }
.level-advanced   { background: #fce4ec; color: #c2185b; }

.main { flex: 1; padding: 40px 32px 80px; overflow-x: hidden; }

.info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
}

.info-card { background: var(--white); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
.info-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.info-icon { width: 48px; height: 48px; background: var(--primary-light); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
.info-card h3 { font-size: 16px; font-weight: 700; color: var(--text); }
.info-card p { color: var(--text-mid); font-size: 14px; line-height: 1.7; }
.info-card .highlight {
    background: var(--success-light); color: var(--success);
    padding: 4px 12px; border-radius: 6px; font-weight: 600;
    display: inline-block; margin-top: 12px; font-size: 13px;
}

.preview-section {
    background: var(--white);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 32px;
    box-shadow: var(--shadow);
}

.preview-header {
    background: #f8f9fa;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
}

.preview-header h3 { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }

.btn-group { display: flex; gap: 12px; flex-wrap: wrap; }

.btn {
    padding: 10px 20px; border-radius: 8px;
    font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.2s;
    text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
}

.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: #0041a8; transform: translateY(-1px); }
.btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary); }
.btn-outline:hover { background: var(--primary-light); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #087030; }

/* ── IMAGE ERROR FALLBACK ── */
.preview-image-wrap {
    position: relative;
    background: #f5f5f5;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.preview-image {
    width: 100%;
    max-height: 600px;
    object-fit: contain;
    background: #f5f5f5;
    display: block;
}

.preview-image-fallback {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    gap: 12px;
    color: var(--text-muted);
    font-size: 15px;
    text-align: center;
}

.preview-image-fallback a {
    color: var(--primary);
    font-weight: 600;
    text-decoration: none;
}

.preview-image-fallback a:hover { text-decoration: underline; }

/* Show fallback when image errors */
.preview-image.errored { display: none; }
.preview-image.errored ~ .preview-image-fallback { display: flex; }

.code-section {
    background: var(--white); border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow); margin-bottom: 32px;
}

.code-header {
    background: #2d3748; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
}

.code-header-left { display: flex; align-items: center; gap: 12px; }
.code-dots { display: flex; gap: 6px; }
.code-dots span { width: 12px; height: 12px; border-radius: 50%; }
.code-dots .red    { background: #ff5f57; }
.code-dots .yellow { background: #febc2e; }
.code-dots .green  { background: #28ca42; }

.code-lang { background: var(--success-light); color: var(--success); padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; }

.code-content {
    background: #1a202c; color: #e2e8f0;
    padding: 24px;
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 14px; line-height: 1.8;
    overflow-x: auto; max-height: 500px; overflow-y: auto;
    direction: ltr; text-align: left;
}

.code-content::-webkit-scrollbar { width: 8px; height: 8px; }
.code-content::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 4px; }

.download-banner {
    background: linear-gradient(135deg, var(--primary), #0041a8);
    color: white; border-radius: var(--radius);
    padding: 40px; text-align: center; box-shadow: var(--shadow);
}

.download-banner h3 { font-size: 28px; margin-bottom: 12px; }
.download-banner p  { font-size: 16px; margin-bottom: 28px; opacity: 0.9; }

.btn-download {
    background: white; color: var(--primary);
    padding: 16px 40px; font-size: 18px; border-radius: 10px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 12px;
    text-decoration: none; transition: all 0.3s;
}

.btn-download:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }

.empty-state { text-align: center; padding: 80px 20px; }
.empty-state-icon { font-size: 80px; margin-bottom: 20px; opacity: 0.5; }
.empty-state h3 { font-size: 24px; color: var(--text); margin-bottom: 12px; }
.empty-state p  { color: var(--text-mid); font-size: 16px; }

.back {
    display: inline-block; width: 12px; height: 12px;
    border-left: 3px solid black; border-bottom: 3px solid black;
    transform: rotate(45deg);
}

@media (max-width: 960px) {
    .page-wrapper { flex-direction: column; }
    .sidebar { width: 100%; position: relative; top: 0; height: auto; border-left: none; border-top: 1px solid var(--border); }
    .sidebar-projects { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; padding: 20px 16px; }
    .main { padding: 24px 22px 56px; }
    .info-grid { grid-template-columns: 1fr; }
}

@media (max-width: 600px) {
    .header-content { flex-direction: column; align-items: flex-start; }
    .main { padding: 18px 14px 48px; }
    .sidebar-projects { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    .btn-group { width: 100%; flex-direction: column; }
    .btn { width: 100%; justify-content: center; }
    .download-banner { padding: 32px 24px; }
    .download-banner h3 { font-size: 22px; }
}
</style>

function convertDriveLink(link) {
    const match = link.match(/\/d\/([a-zA-Z0-9-_]+)/);
    return match ? `https://drive.google.com/uc?export=download&id=${match[1]}` : link;
}

function convertDriveImageLink(link) {
    const match = link.match(/\/d\/([a-zA-Z0-9-_]+)/);
    return match ? `https://lh3.googleusercontent.com/d/${match[1]}=w1000` : link;
}

function getLevelBadge(level) {
    const levels = { 'مبتدئ': 'level-beginner', 'متوسط': 'level-intermediate', 'متقدم': 'level-advanced' };
    return `<span class="level-badge ${levels[level]}">${level}</span>`;
}

function initSidebar() {
    const sidebar = document.getElementById('sidebarProjects');
    Object.keys(contentData).forEach(number => {
        const project = contentData[number];
        const item = document.createElement('div');
        item.className = 'sidebar-project';
        item.innerHTML = `
            <div class="sidebar-project-number">${number}</div>
            <div class="sidebar-project-info">
                <div class="title">المشروع ${number}</div>
                <div class="level">${getLevelBadge(project.level)}</div>
            </div>
        `;
        item.onclick = () => showProject(number);
        sidebar.appendChild(item);
    });
}

function showProject(number) {
    const project = contentData[number];
    const display = document.getElementById('projectDisplay');

    document.querySelectorAll('.sidebar-project').forEach((item, index) => {
        item.classList.toggle('active', (index + 1) == number);
    });

    const imageUrl = convertDriveImageLink(project.image);
    const downloadUrl = convertDriveLink(project.driveLink);

    // Link to local hosted version if it exists, otherwise just show image without link
    const previewLink = `hosting_L1/project${number}.html`;

    const conceptsBadges = project.concepts.map(c =>
        `<span class="highlight">${c}</span>`
    ).join(' ');

    // ── FIX: all divs are properly closed ──
    display.innerHTML = `
        <div class="info-grid">
            <div class="info-card">
                <div class="info-card-header">
                    <div class="info-icon">📚</div>
                    <h3>معلومات المشروع</h3>
                </div>
                <p><strong>الاسم:</strong> ${project.name}</p>
                <p><strong>الوصف:</strong> ${project.description}</p>
                <p><strong>المستوى:</strong> ${project.level}</p>
            </div>
            <div class="info-card">
                <div class="info-card-header">
                    <div class="info-icon">💡</div>
                    <h3>المفاهيم المستخدمة</h3>
                </div>
                <div>${conceptsBadges}</div>
            </div>
            <div class="info-card">
                <div class="info-card-header">
                    <div class="info-icon">🎯</div>
                    <h3>ماذا ستتعلم؟</h3>
                </div>
                <p>في هذا المشروع ستتعلم ${project.concepts.length} مفاهيم أساسية في HTML وتطبيقها عمليًا</p>
            </div>
        </div>

        <div class="preview-section">
            <div class="preview-header">
                <h3>📸 معاينة المشروع</h3>
            </div>
            <div class="preview-image-wrap">
                <a href="${previewLink}">
                    <img
                        id="previewImg${number}"
                        src="${imageUrl}"
                        alt="معاينة المشروع ${number}"
                        class="preview-image"
                        onerror="this.classList.add('errored')"
                    >
                </a>
                <div class="preview-image-fallback">
                    <span style="font-size:48px">🖼️</span>
                    <p>تعذّر تحميل الصورة من Google Drive</p>
                    <a href="${project.image}" target="_blank">افتح الصورة في Drive ↗</a>
                </div>
            </div>
        </div>

        <div class="code-section">
            <div class="code-header">
                <div class="code-header-left">
                    <div class="code-dots">
                        <span class="red"></span>
                        <span class="yellow"></span>
                        <span class="green"></span>
                    </div>
                    <span class="code-lang">HTML</span>
                </div>
                <button class="btn btn-outline" onclick="copyCode()">📋 نسخ الكود</button>
            </div>
            <pre class="code-content" id="codeContent">${escapeHtml(project.code)}</pre>
        </div>

        <div class="download-banner">
            <h3>جاهز للتطبيق؟</h3>
            <p>حمّل المشروع الكامل وابدأ التعلم بالممارسة</p>
            <a href="${downloadUrl}" class="btn-download" target="_blank">
                📦 تحميل ملفات المشروع الكاملة
            </a>
        </div>
    `;

    display.classList.add('active');
    display.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyCode() {
    const code = document.getElementById('codeContent').textContent;
    navigator.clipboard.writeText(code).then(() => {
        const btn = document.querySelector('.code-header .btn-outline');
        if (!btn) return;
        const orig = btn.innerHTML;
        btn.innerHTML = '✅ تم النسخ!';
        btn.style.background = '#0a8a3c';
        btn.style.color = 'white';
        btn.style.borderColor = '#0a8a3c';
        setTimeout(() => {
            btn.innerHTML = orig;
            btn.style.background = '';
            btn.style.color = '';
            btn.style.borderColor = '';
        }, 2000);
    }).catch(() => {
        alert('فشل نسخ الكود. الرجاء المحاولة مرة أخرى.');
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function checkURLParameter() {
    const params = new URLSearchParams(window.location.search);
    const number = params.get('number') || params.get('id') || params.get('n');
    if (number && contentData[number]) {
        setTimeout(() => showProject(number), 100);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    initSidebar();
    checkURLParameter();
});
</script>
